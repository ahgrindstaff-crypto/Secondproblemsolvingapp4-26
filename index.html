<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogicLeap: Protocol 404 - OVERLOAD</title>
    <style>
        :root { --neon: #39ff14; --bg: #050505; --panel: #111; --critical: #ff4b2b; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        #terminal { width: 90%; max-width: 700px; background: var(--panel); border: 2px solid var(--neon); padding: 30px; position: relative; box-shadow: 0 0 20px rgba(57,255,20,0.1); }
        #timer-display { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; border: 1px solid var(--neon); padding: 5px 10px; }
        .screen { display: none; } .active { display: block; }
        .code-block { background: #000; padding: 15px; margin: 15px 0; border-left: 3px solid var(--neon); font-size: 0.9rem; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        button.opt { background: transparent; color: var(--neon); border: 1px solid var(--neon); padding: 12px; text-align: left; cursor: pointer; }
        button.opt:hover { background: var(--neon); color: black; }
        .glitch { animation: shake 0.2s linear 3; border-color: var(--critical) !important; }
        @keyframes shake { 0% { transform: translate(5px); } 50% { transform: translate(-5px); } 100% { transform: translate(0); } }
    </style>
</head>
<body onload="initGame()">

    <div id="terminal">
        <div id="timer-display">08:00</div>
        
        <div id="game-content" class="screen active">
            <h2 id="pillar-title">INITIALIZING...</h2>
            <p id="scenario-text">Loading Protocol 404...</p>
            <div class="code-block" id="task-detail">Waiting for system handshake...</div>
            <div class="options-grid" id="options"></div>
        </div>

        <div id="win" class="screen">
            <h2>SUCCESS: CORE ACCESSED</h2>
            <p>You have cleared 20 layers of logic. System secure.</p>
        </div>
        <div id="fail" class="screen">
            <h2 style="color:var(--critical)">FAILURE: SESSION TIMEOUT</h2>
            <button class="opt" onclick="location.reload()">RESTART (PERSISTENCE)</button>
        </div>

        <div id="status-bar" style="margin-top:20px; font-size:10px;">PROGRESS: 0 / 20</div>
    </div>

    <script>
        let timeLeft = 480; // 8 Minutes for 20 rooms
        let currentStep = 0;
        let timerId;

        const library = {
            decomposition: [
                { q: "Decompose 'Building a Robot'", d: "Which is a core sub-task?", o: ["Buying Sensors", "Naming the Robot", "Painting it red"], a: 0 },
                { q: "Decompose 'Creating a Website'", d: "Which belongs in the 'Front-End' module?", o: ["Database setup", "Navigation Menu design", "Server cooling"], a: 1 },
                { q: "Decompose 'School Lunch'", d: "Which is a logistical sub-task?", o: ["Tasting the food", "Supply chain ordering", "The color of the tray"], a: 1 },
                { q: "Decompose 'Video Game'", d: "Which is a 'Mechanics' sub-task?", o: ["Box Art", "Character Physics", "Marketing"], a: 1 },
                { q: "Decompose 'The Library'", d: "How do we break down 'Organization'?", o: ["Buying books", "Dewey Decimal Sorting", "Cleaning floors"], a: 1 }
            ],
            abstraction: [
                { q: "Abstract: 'Self-Driving Car'", d: "What is the CRUCIAL data?", o: ["Car color", "Distance to obstacle", "The driver's age"], a: 1 },
                { q: "Abstract: 'Weather App'", d: "What info is 'fluff'?", o: ["Temperature", "The font of the logo", "Wind Speed"], a: 1 },
                { q: "Abstract: 'Ordering Pizza'", d: "What is the key variable?", o: ["The delivery driver's car", "Toppings/Address", "The box shape"], a: 1 },
                { q: "Abstract: 'Class Schedule'", d: "What can be ignored?", o: ["The room number", "The teacher's middle name", "The start time"], a: 1 },
                { q: "Abstract: 'Spotify Playlist'", d: "What is essential data?", o: ["The artist name", "The color of the album art", "The date you liked it"], a: 1 }
            ],
            patterns: [
                { q: "Pattern: 2, 4, 8, 16...", d: "Identify the rule:", o: ["Add 2", "Multiply by 2", "Subtract 1"], a: 1 },
                { q: "Pattern: Red, Blue, Red, Blue...", d: "Predict the next:", o: ["Green", "Red", "Yellow"], a: 1 },
                { q: "Pattern: Morning, Noon, Evening...", d: "Identify the cycle:", o: ["Random", "Chronological", "Reverse"], a: 1 },
                { q: "Pattern: If Button A is clicked, Light B turns on.", d: "Rule:", o: ["A controls B", "B controls A", "No relation"], a: 0 },
                { q: "Pattern: Logs show errors every Friday at 4pm.", d: "Rule:", o: ["Weekend update bug", "Random failure", "User error"], a: 0 }
            ],
            algorithmic: [
                { q: "Algorithm: 'Making Toast'", d: "What is Step 1?", o: ["Eat toast", "Put bread in toaster", "Buy butter"], a: 1 },
                { q: "Algorithm: 'Entering Room'", d: "Identify the logic:", o: ["1.Open Door -> 2.Walk", "1.Walk -> 2.Open Door", "1.Close Door -> 2.Walk"], a: 0 },
                { q: "Algorithm: 'Math Problem'", d: "Correct sequence:", o: ["1.Answer -> 2.Work", "1.Read -> 2.Solve -> 3.Check", "1.Check -> 2.Read"], a: 1 },
                { q: "Algorithm: 'Charging Phone'", d: "Logical start:", o: ["Find cable", "Check battery 100%", "Unplug wall"], a: 0 },
                { q: "Algorithm: 'Printing'", d: "Step 2 after 'Open File'?", o: ["Turn off printer", "Select Print", "Close File"], a: 1 }
            ]
        };

        function initGame() {
            startTimer();
            renderStep();
        }

        function startTimer() {
            timerId = setInterval(() => {
                timeLeft--;
                let m = Math.floor(timeLeft/60);
                let s = timeLeft%60;
                document.getElementById('timer-display').innerText = `${m}:${s<10?'0':''}${s}`;
                if(timeLeft <= 0) endGame(false);
            }, 1000);
        }

        function renderStep() {
            if(currentStep >= 20) { return showBoss(); }
            
            const categories = Object.keys(library);
            const cat = categories[Math.floor(currentStep/5)];
            const room = library[cat][currentStep % 5];
            
            document.getElementById('pillar-title').innerText = room.q;
            document.getElementById('scenario-text').innerText = `SECURITY LAYER ${currentStep + 1}/20`;
            document.getElementById('task-detail').innerText = room.d;
            
            const optCont = document.getElementById('options');
            optCont.innerHTML = "";
            room.o.forEach((text, i) => {
                const btn = document.createElement('button');
                btn.className = "opt";
                btn.innerText = text;
                btn.onclick = () => (i === room.a) ? next() : wrong();
                optCont.appendChild(btn);
            });
            document.getElementById('status-bar').innerText = `PROGRESS: ${currentStep} / 20`;
        }

        function next() {
            currentStep++;
            renderStep();
        }

        function wrong() {
            timeLeft -= 15;
            document.getElementById('terminal').classList.add('glitch');
            setTimeout(() => document.getElementById('terminal').classList.remove('glitch'), 500);
        }

        function showBoss() {
            // Reusing your Room 5 logic for the Final Debugging Stand
            document.getElementById('game-content').innerHTML = `
                <h2>FINAL BOSS: THE DEBUGGER</h2>
                <div class="code-block">console.log(Welcome to Class);</div>
                <div class="options-grid">
                    <button class="opt" onclick="endGame(true)">SYNTAX ERROR (FINISH)</button>
                    <button class="opt" onclick="wrong()">NAME ERROR</button>
                </div>
            `;
        }

        function endGame(won) {
            clearInterval(timerId);
            document.getElementById('game-content').style.display = "none";
            document.getElementById(won ? 'win' : 'fail').style.display = "block";
        }
    </script>
</body>
</html>
